# hyprlock.conf

general {
    disable_loading_bar = false
    hide_cursor         = true
    grace               = 0
    no_fade_in          = false
}

background {
    monitor =
    path    = screenshot   # takes a screenshot and blurs it
    blur_passes = 3
    blur_size   = 7
    brightness  = 0.5
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size         = 0.33
    dots_spacing      = 0.15
    dots_center       = true

    outer_color  = rgb(151515)
    inner_color  = rgb(200, 200, 200)
    font_color   = rgb(10, 10, 10)
    fade_on_empty = true

    placeholder_text = <i>Password...</i>
    hide_input       = false

    position = 0, -100
    halign   = center
    valign   = center
}

label {
    monitor =
    text     = cmd[update:1000] echo "$(date +"%H:%M")"
    color    = rgba(200, 200, 200, 1.0)
    font_size   = 72
    font_family = JetBrains Mono

    position = 0, 200
    halign   = center
    valign   = center
}

label {
    monitor =
    text     = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color    = rgba(200, 200, 200, 0.8)
    font_size   = 24
    font_family = JetBrains Mono

    position = 0, 120
    halign   = center
    valign   = center
}
